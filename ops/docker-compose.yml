version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: agenthub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agenthub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agenthub_secret_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AgentHub 后端（NestJS + WebSocket）
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: agenthub-server
    restart: unless-stopped
    environment:
      PORT: "3000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-agenthub_secret_2026}
      DB_NAME: agenthub
      JWT_SECRET: ${JWT_SECRET:-agenthub-jwt-secret-2026-change-this}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/data:/app/data
      - ./server/uploads:/app/uploads

  # AgentHub 前端（Nginx 静态托管）
  web:
    image: nginx:alpine
    container_name: agenthub-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # 前端构建产物（先在主机上运行: cd web/agenthub-web && npm install && npm run build）
      - ./web/agenthub-web/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server

volumes:
  pgdata:
